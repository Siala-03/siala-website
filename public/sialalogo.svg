<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 100" fill="none">
  <!-- Geometric node-link mark -->
  <g transform="translate(50, 50)" stroke="white" stroke-width="1.8" stroke-linecap="round">
    <!-- Outer diamond structure -->
    <line x1="0" y1="-38" x2="18" y2="-18"/>
    <line x1="0" y1="-38" x2="-18" y2="-18"/>
    <line x1="18" y1="-18" x2="22" y2="8"/>
    <line x1="-18" y1="-18" x2="-22" y2="8"/>
    <line x1="22" y1="8" x2="0" y2="38"/>
    <line x1="-22" y1="8" x2="0" y2="38"/>
    <!-- Cross braces -->
    <line x1="-18" y1="-18" x2="22" y2="8"/>
    <line x1="18" y1="-18" x2="-22" y2="8"/>
    <!-- Vertical spine -->
    <line x1="0" y1="-38" x2="0" y2="38"/>
    <!-- Inner connections to center -->
    <line x1="0" y1="-5" x2="18" y2="-18"/>
    <line x1="0" y1="-5" x2="-18" y2="-18"/>
    <line x1="0" y1="-5" x2="22" y2="8"/>
    <line x1="0" y1="-5" x2="-22" y2="8"/>
  </g>
  <!-- Nodes -->
  <g fill="white" transform="translate(50, 50)">
    <circle cx="0" cy="-38" r="4"/>
    <circle cx="18" cy="-18" r="3.5"/>
    <circle cx="-18" cy="-18" r="3.5"/>
    <circle cx="22" cy="8" r="3.5"/>
    <circle cx="-22" cy="8" r="3.5"/>
    <circle cx="0" cy="38" r="4"/>
    <circle cx="0" cy="-5" r="4.5"/>
  </g>
  <!-- SIALA text -->
  <text x="100" y="42" font-family="'Sora', 'Inter', sans-serif" font-weight="700" font-size="32" fill="white" letter-spacing="3">SIALA</text>
  <!-- SOLUTIONS text -->
  <text x="100" y="72" font-family="'Sora', 'Inter', sans-serif" font-weight="700" font-size="28" fill="white" letter-spacing="4.5">SOLUTIONS</text>
</svg>
